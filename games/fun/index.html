<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fun Games - Gamified Teacher</title>
    <meta name="description" content="Quick fun games hosted on GitHub Pages." />
    <style>
      :root {
        color-scheme: light dark;
        --bg1: #111827;
        --bg2: #080c14;
        --card: rgba(255, 255, 255, 0.08);
        --card-border: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.66);
        --accent: #f97316;
        --accent2: #22c55e;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg1: #fff7ed;
          --bg2: #f8fafc;
          --card: rgba(255, 255, 255, 0.82);
          --card-border: rgba(15, 23, 42, 0.1);
          --text: rgba(15, 23, 42, 0.92);
          --muted: rgba(15, 23, 42, 0.62);
          --accent: #ea580c;
          --accent2: #16a34a;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background:
          radial-gradient(900px 600px at 18% 12%, rgba(249, 115, 22, 0.24), transparent 60%),
          radial-gradient(900px 640px at 88% 10%, rgba(34, 197, 94, 0.18), transparent 55%),
          linear-gradient(180deg, var(--bg1), var(--bg2));
        color: var(--text);
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 34px 20px 56px;
      }

      .top-link {
        display: inline-flex;
        margin-bottom: 24px;
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
        font-weight: 650;
      }

      .top-link:hover {
        color: var(--text);
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 4vw, 48px);
        line-height: 1.05;
      }

      .subtitle {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.45;
        max-width: 68ch;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 14px;
      }

      .card {
        grid-column: span 12;
        padding: 16px;
        border: 1px solid var(--card-border);
        border-radius: 12px;
        background: var(--card);
        backdrop-filter: blur(8px);
      }

      @media (min-width: 760px) {
        .card {
          grid-column: span 6;
        }
      }

      .card h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .meta {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.4;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid color-mix(in oklab, var(--accent) 52%, var(--card-border));
        background: color-mix(in oklab, var(--accent) 20%, transparent);
        color: var(--text);
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
      }

      .button:hover {
        border-color: color-mix(in oklab, var(--accent2) 56%, var(--card-border));
        background: color-mix(in oklab, var(--accent2) 18%, transparent);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <a class="top-link" href="../../">Back to all games</a>

      <header>
        <h1>Fun Games</h1>
        <p class="subtitle">
          Quick standalone games for breaks, warmups, and after-class chaos.
        </p>
      </header>

      <section class="grid" aria-label="Fun games">
        <article class="card">
          <h2>Rage Quit: Challenge Edition</h2>
          <p class="meta">
            A precision platformer with ten unfair-looking rooms, instant restarts, death tracking, and a built-in timer.
          </p>
          <a class="button" href="rage-quit/">Open game</a>
        </article>
      </section>
    </main>
  </body>
</html>
